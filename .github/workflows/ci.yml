name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add rustfmt
      - run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: rustup component add clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all

  ffi-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v6
      - run: cargo build --release -p steamroom-ffi
      - run: cargo install diplomat-tool@0.15.0
      - run: mkdir -p crates/steamroom-ffi/bindings/cpp && diplomat-tool cpp crates/steamroom-ffi/bindings/cpp --entry crates/steamroom-ffi/src/lib.rs
      - run: |
          cd examples/python
          STEAMROOM_FFI_LIB_DIR="$GITHUB_WORKSPACE/target/release" \
          STEAMROOM_FFI_BINDINGS_DIR="$GITHUB_WORKSPACE/crates/steamroom-ffi/bindings/cpp" \
          uv run --group dev pytest tests/ -v -m 'not integration'
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/release
